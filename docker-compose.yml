version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: examen-db-local
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpass123}
      - MYSQL_DATABASE=${DB_NAME:-examendb}
      - MYSQL_USER=${DB_USER:-appuser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-apppass123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - examen-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./innovatech-backend
    container_name: examen-backend-local
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-appuser}
      - DB_PASSWORD=${DB_PASSWORD:-apppass123}
      - DB_NAME=${DB_NAME:-examendb}
    networks:
      - examen-net

  frontend:
    build: ./innovatech-frontend
    container_name: examen-frontend-local
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - examen-net

networks:
  examen-net:
    driver: bridge

volumes:
  db_data:
