version: '3.8'

services:
  backend:
    build: ./innovatech-backend
    container_name: innovatech-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000

  frontend:
    build: ./innovatech-frontend
    container_name: innovatech-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
