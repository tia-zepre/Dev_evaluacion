name: Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: examen-cluster
  ECS_BACKEND_SERVICE: examen-backend-service
  ECS_FRONTEND_SERVICE: examen-frontend-service
  ECR_BACKEND_REPO: examen-backend
  ECR_FRONTEND_REPO: examen-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run backend tests
        run: |
          cd innovatech-backend
          npm install
          npm test --if-present

      - name: Build, tag and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_BACKEND_REPO:latest ./innovatech-backend
          docker push $REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_BACKEND_REPO:latest

      - name: Build, tag and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_FRONTEND_REPO:latest ./innovatech-frontend
          docker push $REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_FRONTEND_REPO:latest

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_BACKEND_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_FRONTEND_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for backend deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_BACKEND_SERVICE \
            --region $AWS_REGION

      - name: Wait for frontend deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_FRONTEND_SERVICE \
            --region $AWS_REGION
