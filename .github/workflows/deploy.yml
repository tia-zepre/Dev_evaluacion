name: Deploy to EKS

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: innovatech-eks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/innovatech-backend:$IMAGE_TAG ./innovatech-backend
          docker push $REGISTRY/innovatech-backend:$IMAGE_TAG

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/innovatech-frontend:$IMAGE_TAG ./innovatech-frontend
          docker push $REGISTRY/innovatech-frontend:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Roll out new images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/innovatech-backend innovatech-backend=$REGISTRY/innovatech-backend:$IMAGE_TAG
          kubectl set image deployment/innovatech-frontend innovatech-frontend=$REGISTRY/innovatech-frontend:$IMAGE_TAG
          kubectl rollout status deployment/innovatech-backend
          kubectl rollout status deployment/innovatech-frontend
