apiVersion: apps/v1
kind: Deployment
metadata:
  name: innovatech-backend
  labels:
    app: innovatech-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: innovatech-backend
  template:
    metadata:
      labels:
        app: innovatech-backend
    spec:
      containers:
        - name: innovatech-backend
          # Reemplaza <ACCOUNT_ID> antes del primer "kubectl apply".
          # Los despliegues siguientes lo actualiza el pipeline con "kubectl set image".
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
